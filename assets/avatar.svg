<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Khyathi Kiran Pediredla monogram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
